kind = "web"
previewPath = "/"
title = "HormuzWatch"
version = "1.0.0"
id = "artifacts/hormuzwatch"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23280

[services.development]
run = "pnpm --filter @workspace/hormuzwatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hormuzwatch", "run", "build" ]
serve = "static"
publicDir = "artifacts/hormuzwatch/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23280"
BASE_PATH = "/"
